---
# Tasks for the PostgreSQL 16 role — install, tune, secure

- name: Add official PostgreSQL APT repository key
  ansible.builtin.apt_key:
    url: "https://www.postgresql.org/media/keys/ACCC4CF8.asc"
    state: present
  tags: [postgresql, repo, packages]

- name: Add official PostgreSQL APT repository
  ansible.builtin.apt_repository:
    repo: "deb https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg
  tags: [postgresql, repo, packages]

- name: Install PostgreSQL 16 packages
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgresql_version }}"
      - "postgresql-client-{{ postgresql_version }}"
      - "postgresql-contrib"
    state: present
    update_cache: true
  tags: [postgresql, packages]

- name: Ensure WAL archive directory exists
  ansible.builtin.file:
    path: "{{ postgresql_data_directory }}/wal_archive"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"
  when: postgresql_archive_mode | default(false) | bool
  tags: [postgresql, wal, config]

- name: Deploy postgresql.conf with Nextcloud-optimized settings
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart postgresql
  tags: [postgresql, config]

- name: Deploy pg_hba.conf — local access only, md5 auth
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Reload postgresql
  tags: [postgresql, config, security]

- name: Ensure PostgreSQL service is running and enabled
  ansible.builtin.systemd:
    name: "postgresql@{{ postgresql_version }}-main"
    state: started
    enabled: true
  tags: [postgresql, service]

- name: Wait for PostgreSQL to accept connections
  ansible.builtin.command: >-
    pg_isready -h {{ postgresql_listen_addresses }} -p 5432
  register: pg_isready_result
  changed_when: false
  failed_when: pg_isready_result.rc != 0
  retries: 10
  delay: 2
  until: pg_isready_result.rc == 0
  tags: [postgresql, service, validate]

- name: Create Nextcloud database user
  become: true
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ postgresql_user }}"
    password: "{{ postgresql_password }}"
    encrypted: true
    state: present
  no_log: true
  tags: [postgresql, database, user]

- name: Create Nextcloud database
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ postgresql_db }}"
    owner: "{{ postgresql_user }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    state: present
  tags: [postgresql, database]

- name: Grant all privileges on Nextcloud database to Nextcloud user
  become: true
  become_user: postgres
  community.postgresql.postgresql_privs:
    database: "{{ postgresql_db }}"
    privs: ALL
    type: database
    objs: "{{ postgresql_db }}"
    role: "{{ postgresql_user }}"
    state: present
  tags: [postgresql, database, privileges]

- name: Enable pg_stat_statements extension in Nextcloud database
  become: true
  become_user: postgres
  community.postgresql.postgresql_ext:
    name: pg_stat_statements
    db: "{{ postgresql_db }}"
    state: present
  tags: [postgresql, database, monitoring]

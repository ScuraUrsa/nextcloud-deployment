---
# Default variables for the PostgreSQL role

# PostgreSQL version to install
postgresql_version: 16

# Database and user for Nextcloud
postgresql_db: nextcloud
postgresql_user: nextcloud
postgresql_password: "{{ vault_postgresql_password }}"

# Memory tuning — optimized for Nextcloud with ~50 users
# Assumes ~16GB total system RAM; adjust for your hardware
postgresql_shared_buffers: "4GB"
postgresql_effective_cache_size: "12GB"
postgresql_work_mem: "32MB"
postgresql_maintenance_work_mem: "512MB"

# Connection limits
postgresql_max_connections: 50

# Query planner tuning (SSD storage assumed)
postgresql_random_page_cost: 1.1

# WAL archiving for point-in-time recovery
postgresql_wal_level: replica
postgresql_archive_mode: on
postgresql_archive_command: "test ! -f /var/lib/postgresql/16/main/wal_archive/%f && cp %p /var/lib/postgresql/16/main/wal_archive/%f"

# Network — listen on localhost only (Nextcloud connects locally)
postgresql_listen_addresses: localhost

# Data directory (Ubuntu 24.04 default for PG 16)
postgresql_data_directory: "/var/lib/postgresql/16/main"

# pg_stat_statements extension for query monitoring
postgresql_shared_preload_libraries: "pg_stat_statements"
postgresql_pg_stat_statements_track: all

---
# Elasticsearch role tasks

- name: Add Elastic APT repository GPG key
  ansible.builtin.apt_key:
    url: "https://artifacts.elastic.co/GPG-KEY-elasticsearch"
    state: present

- name: Add Elastic APT repository
  ansible.builtin.apt_repository:
    repo: "deb https://artifacts.elastic.co/packages/{{ elasticsearch_version }}/apt stable main"
    state: present
    filename: elastic-{{ elasticsearch_version }}
    update_cache: true

- name: Install Elasticsearch
  ansible.builtin.apt:
    name: elasticsearch
    state: present
    update_cache: true

- name: Deploy elasticsearch.yml
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: root
    group: elasticsearch
    mode: "0660"
  notify: Restart elasticsearch

- name: Deploy jvm.options
  ansible.builtin.template:
    src: jvm.options.j2
    dest: /etc/elasticsearch/jvm.options.d/heap.options
    owner: root
    group: elasticsearch
    mode: "0644"
  notify: Restart elasticsearch

- name: Enable and start Elasticsearch
  ansible.builtin.systemd:
    name: elasticsearch
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Elasticsearch cluster health green
  ansible.builtin.uri:
    url: "http://{{ elasticsearch_network_host }}:{{ elasticsearch_http_port }}/_cluster/health"
    method: GET
    user: elastic
    password: "{{ elasticsearch_initial_password | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: _es_health
  until: _es_health.json.status == "green"
  retries: 30
  delay: 5
  changed_when: false

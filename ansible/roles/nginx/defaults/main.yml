---
# Default variables for the Nginx reverse proxy role

# Domain name for the Nextcloud server
nginx_server_name: "{{ nextcloud_domain }}"

# SSL/TLS certificate paths (Let's Encrypt)
nginx_ssl_certificate: "/etc/letsencrypt/live/{{ nextcloud_domain }}/fullchain.pem"
nginx_ssl_certificate_key: "/etc/letsencrypt/live/{{ nextcloud_domain }}/privkey.pem"

# TLS protocols — TLSv1.3 preferred, TLSv1.2 for compatibility
nginx_ssl_protocols: "TLSv1.2 TLSv1.3"

# Mozilla Intermediate cipher suite (modern, broad compatibility)
nginx_ssl_ciphers: >-
  ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:
  ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:
  ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:
  DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384

# SSL session settings
nginx_ssl_session_cache: "shared:SSL:10m"
nginx_ssl_session_timeout: "1d"
nginx_ssl_session_tickets: "off"

# OCSP stapling
nginx_ssl_stapling: "on"
nginx_ssl_stapling_verify: "on"
nginx_resolver: "8.8.8.8 8.8.4.4 valid=300s"
nginx_resolver_timeout: "5s"

# DH parameters (use 2048-bit for Mozilla Intermediate)
nginx_ssl_dhparam: "/etc/ssl/certs/dhparam.pem"

# HSTS — 1 year, include subdomains, preload-ready
nginx_hsts_max_age: 31536000
nginx_hsts_include_subdomains: true
nginx_hsts_preload: false

# Rate limiting
nginx_rate_limit_requests: "30r/s"
nginx_rate_limit_burst: 50
nginx_rate_limit_zone_size: "10m"

# Client body size (Nextcloud needs large uploads)
nginx_client_max_body_size: "16G"

# PHP-FPM upstream socket
nginx_php_handler: "unix:/var/run/php/php8.3-fpm.sock"

# Gzip compression
nginx_gzip: "on"
nginx_gzip_vary: "on"
nginx_gzip_proxied: "any"
nginx_gzip_comp_level: 6
nginx_gzip_types: >-
  text/plain text/css text/xml text/javascript
  application/json application/javascript application/xml+rss
  application/rss+xml application/atom+xml image/svg+xml
  application/x-font-ttf font/opentype

# Certbot / Let's Encrypt
nginx_certbot_email: "admin@{{ nextcloud_domain }}"
nginx_certbot_staging: "{{ tls_staging | default(false) }}"
nginx_certbot_rsa_key_size: 4096

# Nginx package
nginx_package: "nginx-full"

# Site configuration
nginx_sites_available: "/etc/nginx/sites-available"
nginx_sites_enabled: "/etc/nginx/sites-enabled"
nginx_site_name: "nextcloud"

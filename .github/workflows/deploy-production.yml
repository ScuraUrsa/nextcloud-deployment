name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pre-flight:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linting tools
        run: pip install ansible-lint yamllint
      - name: Run ansible-lint
        run: ansible-lint ansible/playbooks/*.yml ansible/roles/*/tasks/*.yml
      - name: Run yamllint
        run: yamllint ansible/
      - name: Syntax check playbooks
        run: |
          for playbook in ansible/playbooks/*.yml; do
            ansible-playbook --syntax-check "$playbook" -i ansible/inventory/production/hosts.yml
          done
      - name: Run smoke tests against staging
        run: |
          pip install -r tests/requirements-test.txt
          NEXTCLOUD_URL="${{ vars.STAGING_URL }}" \
          NEXTCLOUD_ADMIN_USER="${{ secrets.NEXTCLOUD_ADMIN_USER }}" \
          NEXTCLOUD_ADMIN_PASS="${{ secrets.NEXTCLOUD_ADMIN_PASS }}" \
          pytest -m smoke

  backup-production:
    needs: pre-flight
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: pip install ansible
      - name: Install collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
      - name: Run pre-deployment backup
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault-pass
          ansible-playbook -i ansible/inventory/production/hosts.yml \
            ansible/playbooks/nextcloud_backup.yml \
            --vault-password-file /tmp/vault-pass

  deploy-production:
    needs: backup-production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: pip install ansible
      - name: Install collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
      - name: Deploy to production
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault-pass
          ansible-playbook -i ansible/inventory/production/hosts.yml \
            ansible/playbooks/nextcloud_full_deploy.yml \
            --vault-password-file /tmp/vault-pass
      - name: Run smoke tests against production
        run: |
          pip install -r tests/requirements-test.txt
          NEXTCLOUD_URL="${{ vars.PRODUCTION_URL }}" \
          NEXTCLOUD_ADMIN_USER="${{ secrets.NEXTCLOUD_ADMIN_USER }}" \
          NEXTCLOUD_ADMIN_PASS="${{ secrets.NEXTCLOUD_ADMIN_PASS }}" \
          pytest -m smoke

  rollback:
    if: failure()
    needs: deploy-production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: pip install ansible
      - name: Rollback deployment
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault-pass
          ansible-playbook -i ansible/inventory/production/hosts.yml \
            ansible/playbooks/nextcloud_upgrade.yml \
            -e "rollback=true" \
            --vault-password-file /tmp/vault-pass
      - name: Create alert issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Production deployment failed — rollback executed',
              body: `Deployment run ${context.runId} failed. Rollback triggered automatically.\n\nCheck logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['incident', 'production']
            });

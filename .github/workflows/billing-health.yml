name: Billing Health Check

on:
  schedule:
    - cron: '0 * * * *'  # Hourly
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-lago:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Pre-flight — check LAGO_API_URL is set and reachable
        run: |
          if [ -z "${{ vars.LAGO_API_URL }}" ]; then
            echo "::notice::LAGO_API_URL is not set — skipping Lago health check"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 \
            "${{ vars.LAGO_API_URL }}/health" || echo "000")
          if [ "$STATUS" = "000" ]; then
            echo "::notice::Lago API at ${{ vars.LAGO_API_URL }} is unreachable (network/connectivity) — skipping"
            exit 0
          fi
          if [ "$STATUS" != "200" ]; then
            echo "::error::Lago API health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "Lago API healthy (HTTP $STATUS)"

  check-btcpay:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Pre-flight — check BTCPAY_DOMAIN is set and reachable
        run: |
          if [ -z "${{ vars.BTCPAY_DOMAIN }}" ]; then
            echo "::notice::BTCPAY_DOMAIN is not set — skipping BTCPay health check"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 \
            "https://${{ vars.BTCPAY_DOMAIN }}/health" || echo "000")
          if [ "$STATUS" = "000" ]; then
            echo "::notice::BTCPay Server at ${{ vars.BTCPAY_DOMAIN }} is unreachable (network/connectivity) — skipping"
            exit 0
          fi
          if [ "$STATUS" != "200" ]; then
            echo "::error::BTCPay Server health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "BTCPay Server healthy (HTTP $STATUS)"

  check-invoiceplane:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Pre-flight — check INVOICEPLANE_DOMAIN is set and reachable
        run: |
          if [ -z "${{ vars.INVOICEPLANE_DOMAIN }}" ]; then
            echo "::notice::INVOICEPLANE_DOMAIN is not set — skipping InvoicePlane check"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 \
            "https://${{ vars.INVOICEPLANE_DOMAIN }}" || echo "000")
          if [ "$STATUS" = "000" ]; then
            echo "::notice::InvoicePlane at ${{ vars.INVOICEPLANE_DOMAIN }} is unreachable (network/connectivity) — skipping"
            exit 0
          fi
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "::error::InvoicePlane unreachable (HTTP $STATUS)"
            exit 1
          fi
          echo "InvoicePlane reachable (HTTP $STATUS)"

  check-webhooks:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check recent webhook deliveries
        run: |
          # Check Lago webhook logs for recent deliveries
          echo "Checking webhook delivery status..."
          # This would SSH into the server and check logs
          # Placeholder for actual implementation
          echo "Webhook check placeholder — requires server access"

  alert-on-failure:
    if: failure()
    needs: [check-lago, check-btcpay, check-invoiceplane, check-webhooks]
    runs-on: ubuntu-latest
    steps:
      - name: Create alert issue
        uses: actions/github-script@v7
        with:
          script: |
            const failedJobs = [];
            if ('${{ needs.check-lago.result }}' === 'failure') failedJobs.push('Lago API');
            if ('${{ needs.check-btcpay.result }}' === 'failure') failedJobs.push('BTCPay Server');
            if ('${{ needs.check-invoiceplane.result }}' === 'failure') failedJobs.push('InvoicePlane');
            if ('${{ needs.check-webhooks.result }}' === 'failure') failedJobs.push('Webhooks');

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `💳 Billing stack component(s) down: ${failedJobs.join(', ')}`,
              body: `Hourly billing health check detected failures in: ${failedJobs.join(', ')}.\n\nCheck logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['billing', 'incident', 'urgent']
            });

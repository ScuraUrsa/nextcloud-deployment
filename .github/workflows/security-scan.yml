name: Security Scanning

on:
  schedule:
    - cron: '0 4 * * *'  # Daily 04:00 UTC = 06:00 CEST
  workflow_dispatch:

permissions:
  issues: write

jobs:
  nextcloud-security-scan:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Resolve PRODUCTION_URL and check reachability
        id: preflight
        run: |
          URL="${{ vars.PRODUCTION_URL }}"
          if [ -z "$URL" ]; then
            URL="${{ secrets.PRODUCTION_URL }}"
          fi
          if [ -z "$URL" ]; then
            echo "::notice::PRODUCTION_URL is not set (neither as var nor secret) — skipping Nextcloud security scan"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 \
            "https://${URL}" || echo "000")
          if [ "$STATUS" = "000" ]; then
            echo "::notice::Nextcloud at ${URL} is unreachable (network/connectivity) — skipping scan"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Nextcloud reachable (HTTP $STATUS) — proceeding with scan"
      - name: Run Nextcloud security scanner
        if: steps.preflight.outputs.skip != 'true'
        run: |
          URL="${{ steps.preflight.outputs.url }}"
          SCAN_URL="https://security-scan.nextcloud.com/api/scan"
          RESPONSE=$(curl -s -X POST "$SCAN_URL" -d "url=${URL}")
          echo "Scan result: $RESPONSE"
          RATING=$(echo "$RESPONSE" | jq -r '.rating // "unknown"')
          echo "Security rating: $RATING"
          if [ "$RATING" != "A+" ] && [ "$RATING" != "A" ]; then
            echo "::warning::Security rating is $RATING — below A"
          fi
      - name: Create issue if rating below A+
        if: failure() && steps.preflight.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Nextcloud security scan rating below A+',
              body: `Daily security scan found issues.\n\nCheck logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['security', 'incident']
            });

  ssl-check:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Resolve PRODUCTION_URL and check reachability
        id: preflight
        run: |
          URL="${{ vars.PRODUCTION_URL }}"
          if [ -z "$URL" ]; then
            URL="${{ secrets.PRODUCTION_URL }}"
          fi
          if [ -z "$URL" ]; then
            echo "::notice::PRODUCTION_URL is not set (neither as var nor secret) — skipping SSL check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 \
            "https://${URL}" || echo "000")
          if [ "$STATUS" = "000" ]; then
            echo "::notice::Nextcloud at ${URL} is unreachable (network/connectivity) — skipping SSL check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Nextcloud reachable (HTTP $STATUS) — proceeding with SSL check"
      - name: Install testssl.sh
        if: steps.preflight.outputs.skip != 'true'
        run: |
          git clone --depth 1 https://github.com/drwetter/testssl.sh.git /tmp/testssl
      - name: Run SSL check
        if: steps.preflight.outputs.skip != 'true'
        run: |
          URL="${{ steps.preflight.outputs.url }}"
          /tmp/testssl/testssl.sh --quiet --protocols --cipher-per-proto "${URL}" 2>&1 | tee ssl-report.txt
      - name: Verify TLS version
        if: steps.preflight.outputs.skip != 'true'
        run: |
          if grep -q "TLSv1.0\|TLSv1.1\|SSLv" ssl-report.txt; then
            echo "::error::Weak TLS/SSL protocols detected"
            exit 1
          fi
          echo "TLS protocols OK"
      - name: Create issue on failure
        if: failure() && steps.preflight.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 SSL/TLS security check failed',
              body: `Weak TLS protocols or ciphers detected.\n\nCheck logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['security', 'incident']
            });

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r tests/requirements-test.txt
      - name: Install and verify Ansible collections
        run: |
          pip install ansible
          ansible-galaxy collection install -r ansible/requirements.yml
          # Verify collections are installed (skip integrity check — community.general
          # has modified test scaffolding files that cause verify to fail)
          for col in community.general community.postgresql community.docker ansible.posix; do
            if ansible-galaxy collection list "$col" > /dev/null 2>&1; then
              echo "✓ $col is installed"
            else
              echo "::error::$col is NOT installed"
              exit 1
            fi
          done

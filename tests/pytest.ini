[pytest]
# Pytest configuration for Nextcloud deployment test suite

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    smoke: Quick sanity checks — run first to verify basic functionality
    core: Core Nextcloud functionality (files, sharing, WebDAV)
    collaboration: Collaboration features (Talk, Circles, comments)
    content: Content management (files, versions, trash)
    admin: Administration features (users, groups, settings)
    identity: Identity and authentication (Keycloak, SSO, LDAP)
    tiers: Tier-specific features and limits
    billing: Billing and subscription (Lago integration)
    performance: Performance and load tests
    security: Security tests (permissions, encryption, brute-force)
    slow: Tests that take longer than 30 seconds
    external: Tests that require external services or network access

# Timeout
timeout = 300
timeout_method = signal

# Default options
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config

# Logging
log_cli = false
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
